<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Streak System</title>

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: #0b1220;
  color: white;
  display: flex;
  justify-content: center;
}

.container {
  width: 100%;
  max-width: 420px;
  padding: 20px;
  text-align: center;
}

h1 {
  margin-bottom: 5px;
  font-size: 28px;
}

.badge {
  margin: 10px 0;
  font-size: 14px;
  opacity: 0.8;
}

.bar {
  height: 18px;
  background: #1e293b;
  border-radius: 20px;
  overflow: hidden;
  margin: 20px 0;
}

.fill {
  height: 100%;
  width: 0%;
  transition: 0.4s;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  font-size: 15px;
}

.validate { background: #22c55e; }
.reset { background: #ef4444; }

.stats {
  margin-top: 15px;
  font-size: 14px;
  opacity: 0.8;
}
</style>
</head>

<body>

<div class="container">

<h1 id="streak"></h1>
<div class="badge" id="badge"></div>

<div class="bar">
  <div class="fill" id="fill"></div>
</div>

<button class="validate" onclick="validate()">Valider aujourd’hui</button>
<button class="reset" onclick="reset()">Reset</button>

<div class="stats" id="stats"></div>

</div>

<script>
let goals = [3,5,10,15,30];

let streak = parseInt(localStorage.streak || 0);
let level = parseInt(localStorage.level || 0);
let cycles = parseInt(localStorage.cycles || 0);
let last = localStorage.last || null;

let today = new Date().toDateString();

let goal = goals[level] || 30;

// UI
function render() {
  document.getElementById("streak").innerText =
    "🔥 " + streak + " jours";

  document.getElementById("badge").innerText =
    "🌙 Cycles complétés : " + cycles +
    " | 🎯 Objectif : " + goal + " jours";

  let percent = streak / goal;

  let fill = document.getElementById("fill");
  fill.style.width = (percent * 100) + "%";

  if (percent < 0.5) fill.style.background = "#22c55e";
  else if (percent < 0.8) fill.style.background = "#f59e0b";
  else fill.style.background = "#ef4444";

  document.getElementById("stats").innerText =
    "Objectif suivant : " + goal;
}

render();

// validation
function validate() {
  if (last === today) {
    alert("Déjà validé aujourd’hui");
    return;
  }

  streak++;
  last = today;

  localStorage.streak = streak;
  localStorage.last = last;

  // progression niveau
  if (streak >= goal) {
    level++;
    streak = 0;
    localStorage.level = level;
    localStorage.streak = streak;

    // cycle terminé (30 jours atteint)
    if (level >= goals.length) {
      cycles++;
      localStorage.cycles = cycles;

      level = 0;
      localStorage.level = 0;

      // petite "récompense reset propre"
      alert("🌙 Cycle terminé ! +1 mois validé");
    }
  }

  render();
}

// reset
function reset() {
  let txt = prompt("Tape RESET pour confirmer");

  if (txt === "RESET") {
    streak = 0;
    level = 0;
    last = null;

    localStorage.streak = 0;
    localStorage.level = 0;
    localStorage.last = null;

    render();
  }
}
</script>

</body>
</html>
