<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discipline Tracker</title>

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: #0b1220;
  color: white;
  display: flex;
  justify-content: center;
}

.container {
  max-width: 420px;
  width: 100%;
  padding: 20px;
  text-align: center;
}

h1 {
  margin-bottom: 5px;
}

.badge {
  font-size: 13px;
  opacity: 0.8;
  margin-bottom: 10px;
}

.bar {
  height: 18px;
  background: #1e293b;
  border-radius: 20px;
  overflow: hidden;
  margin: 15px 0;
}

.fill {
  height: 100%;
  width: 0%;
  transition: 0.4s;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
}

.validate { background: #22c55e; }
.reset { background: #ef4444; }

.calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
  margin-top: 20px;
}

.day {
  font-size: 11px;
  padding: 8px 0;
  border-radius: 5px;
  background: #1e293b;
}

.valid { background: #22c55e; }
.fail { background: #ef4444; }
.today { outline: 2px solid white; }

.stats {
  margin-top: 10px;
  font-size: 13px;
  opacity: 0.8;
}
</style>
</head>

<body>

<div class="container">

<h1 id="streak"></h1>
<div class="badge" id="badge"></div>

<div class="bar">
  <div class="fill" id="fill"></div>
</div>

<button class="validate" onclick="validate()">Valider aujourd’hui</button>
<button class="reset" onclick="reset()">Reset</button>

<div class="stats" id="stats"></div>

<div class="calendar" id="calendar"></div>

</div>

<script>
let goals = [3,5,10,15,30];

let streak = parseInt(localStorage.streak || 0);
let level = parseInt(localStorage.level || 0);
let cycles = parseInt(localStorage.cycles || 0);

let history = JSON.parse(localStorage.history || "{}");

let last = localStorage.last;
let today = new Date().toDateString();

let goal = goals[level] || 30;

// UI
function render() {

  document.getElementById("streak").innerText =
    "🔥 " + streak + " jours";

  document.getElementById("badge").innerText =
    "🌙 Cycles : " + cycles + " | 🎯 Objectif : " + goal;

  let percent = streak / goal;

  let fill = document.getElementById("fill");
  fill.style.width = (percent * 100) + "%";

  if (percent < 0.5) fill.style.background = "#22c55e";
  else if (percent < 0.8) fill.style.background = "#f59e0b";
  else fill.style.background = "#ef4444";

  document.getElementById("stats").innerText =
    "Progression globale active";

  renderCalendar();
}

function validate() {
  if (last === today) {
    alert("Déjà validé aujourd’hui");
    return;
  }

  streak++;
  last = today;

  history[today] = "valid";

  localStorage.streak = streak;
  localStorage.last = last;
  localStorage.history = JSON.stringify(history);

  if (streak >= goal) {
    level++;
    streak = 0;

    if (level >= goals.length) {
      cycles++;
      level = 0;
      alert("🌙 Cycle complet validé !");
    }

    localStorage.level = level;
    localStorage.streak = streak;
    localStorage.cycles = cycles;
  }

  render();
}

function reset() {
  let txt = prompt("Tape RESET pour confirmer");

  if (txt === "RESET") {
    history[today] = "fail";

    streak = 0;
    level = 0;
    last = null;

    localStorage.streak = 0;
    localStorage.level = 0;
    localStorage.last = null;
    localStorage.history = JSON.stringify(history);

    render();
  }
}

// calendrier
function renderCalendar() {
  let cal = document.getElementById("calendar");
  cal.innerHTML = "";

  let now = new Date();
  let year = now.getFullYear();
  let month = now.getMonth();

  let first = new Date(year, month, 1).getDay();
  let days = new Date(year, month+1, 0).getDate();

  for (let i = 0; i < first; i++) {
    cal.innerHTML += "<div></div>";
  }

  for (let d = 1; d <= days; d++) {
    let date = new Date(year, month, d).toDateString();

    let cls = "day";

    if (history[date] === "valid") cls += " valid";
    if (history[date] === "fail") cls += " fail";
    if (date === today) cls += " today";

    cal.innerHTML += `<div class="${cls}">${d}</div>`;
  }
}

render();
</script>

</body>
</html>
