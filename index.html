<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracker</title>

<style>
body {
  font-family: sans-serif;
  text-align: center;
  padding: 20px;
  background: #111;
  color: white;
}

h1 { margin-bottom: 5px; }

.bar {
  width: 100%;
  height: 30px;
  background: #333;
  border-radius: 20px;
  overflow: hidden;
  margin: 15px 0;
}

.fill {
  height: 100%;
  width: 100%;
  transition: 0.5s;
}

button, input {
  margin-top: 10px;
  padding: 10px;
  border-radius: 8px;
  border: none;
  font-size: 14px;
}

button { background: #444; color: white; }

.small { font-size: 14px; opacity: 0.7; }
</style>
</head>
<body>

<h1 id="counter"></h1>
<div id="msg"></div>

<div class="bar">
  <div class="fill" id="fill"></div>
</div>

<div class="small" id="stats"></div>

<br>

<input type="number" id="customGoal" placeholder="Objectif perso (jours)">
<br>
<button onclick="setGoal()">Définir objectif</button>
<br>

<button onclick="reset()">Reset</button>
<button onclick="testNotif()">Test notif</button>

<script>
let defaultGoals = [3,5,10,15,30];

let start = localStorage.start;
let level = parseInt(localStorage.level || 0);
let totalStreak = parseInt(localStorage.total || 0);
let history = JSON.parse(localStorage.history || "[]");
let customGoal = localStorage.customGoal;

if (!start) {
  start = Date.now();
  localStorage.start = start;
}

let days = Math.floor((Date.now() - start) / 86400000);
let goal = customGoal ? parseInt(customGoal) : (defaultGoals[level] || 30);

// affichage
document.getElementById("counter").innerText =
  days + " / " + goal + " jours";

// barre
let percent = days / goal;
let fill = document.getElementById("fill");
fill.style.width = (100 - percent*100) + "%";

if (percent < 0.5) fill.style.background = "green";
else if (percent < 0.8) fill.style.background = "orange";
else fill.style.background = "red";

// message
let msg = "";
if (days === 0) msg = "On commence.";
else if (percent < 0.5) msg = "Tu gères.";
else if (percent < 0.8) msg = "Continue.";
else if (percent < 1) msg = "Presque.";
else msg = "Objectif atteint.";

document.getElementById("msg").innerText = msg;

// stats
document.getElementById("stats").innerText =
  "🔥 Streak total: " + totalStreak +
  " | 📅 rechutes: " + history.length;

// passage niveau
if (days >= goal) {
  totalStreak += goal;
  localStorage.total = totalStreak;

  level++;
  localStorage.level = level;
  localStorage.start = Date.now();
}

// reset
function reset() {
  if (confirm("Reset = échec. Continuer ?")) {
    history.push(new Date().toLocaleDateString());
    localStorage.history = JSON.stringify(history);
    localStorage.start = Date.now();
  }
}

// objectif perso
function setGoal() {
  let val = document.getElementById("customGoal").value;
  if (val > 0) {
    localStorage.customGoal = val;
    localStorage.start = Date.now();
    location.reload();
  }
}

// 🔔 notifications (limitées)
function testNotif() {
  if (Notification.permission === "granted") {
    new Notification("Continue ton objectif !");
  } else if (Notification.permission !== "denied") {
    Notification.requestPermission();
  }
}
</script>

</body>
</html>
