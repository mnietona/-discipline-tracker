<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discipline</title>

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: #0f172a;
  color: white;
  display: flex;
  justify-content: center;
}

.container {
  max-width: 420px;
  width: 100%;
  padding: 20px;
  text-align: center;
}

h1 { margin-bottom: 5px; }

.bar {
  height: 20px;
  background: #1e293b;
  border-radius: 20px;
  overflow: hidden;
  margin: 15px 0;
}

.fill {
  height: 100%;
  transition: 0.3s;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  font-size: 15px;
}

.validate { background: #22c55e; }
.reset { background: #ef4444; }

.calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 5px;
  margin-top: 20px;
}

.day {
  padding: 10px 0;
  border-radius: 6px;
  font-size: 12px;
}

.valid { background: #22c55e; }
.fail { background: #ef4444; }
.today { border: 2px solid white; }

.stats {
  margin-top: 15px;
  font-size: 14px;
  opacity: 0.8;
}
</style>
</head>
<body>

<div class="container">

<h1 id="days"></h1>
<div id="goal"></div>

<div class="bar">
  <div class="fill" id="fill"></div>
</div>

<button class="validate" onclick="validate()">Valider aujourd'hui</button>
<button class="reset" onclick="reset()">J'ai échoué</button>

<div class="calendar" id="calendar"></div>

<div class="stats" id="stats"></div>

</div>

<script>
let goals = [3,5,10,15,30];

let days = parseInt(localStorage.days || 0);
let level = parseInt(localStorage.level || 0);
let total = parseInt(localStorage.total || 0);
let fails = parseInt(localStorage.fails || 0);
let history = JSON.parse(localStorage.history || "{}");

let today = new Date();
let todayStr = today.toDateString();

let goal = goals[level] || 30;

// UI
document.getElementById("days").innerText = days + " jours";
document.getElementById("goal").innerText = "Objectif: " + goal;

// barre
let percent = days / goal;
let fill = document.getElementById("fill");
fill.style.width = (percent * 100) + "%";

if (percent < 0.5) fill.style.background = "#22c55e";
else if (percent < 0.8) fill.style.background = "#f59e0b";
else fill.style.background = "#ef4444";

// stats
document.getElementById("stats").innerText =
  "🔥 Total: " + total + " | ❌ Échecs: " + fails;

// validation
function validate() {
  if (history[todayStr]) {
    alert("Déjà fait aujourd'hui");
    return;
  }

  history[todayStr] = "valid";
  days++;
  total++;

  localStorage.history = JSON.stringify(history);
  localStorage.days = days;
  localStorage.total = total;

  if (days >= goal) {
    level++;
    localStorage.level = level;
    localStorage.days = 0;
  }

  location.reload();
}

// reset
function reset() {
  let txt = prompt("Tape RESET");

  if (txt === "RESET") {
    history[todayStr] = "fail";
    fails++;

    localStorage.history = JSON.stringify(history);
    localStorage.fails = fails;
    localStorage.days = 0;
    localStorage.level = 0;

    location.reload();
  }
}

// calendrier
let cal = document.getElementById("calendar");

let year = today.getFullYear();
let month = today.getMonth();

let firstDay = new Date(year, month, 1).getDay();
let daysInMonth = new Date(year, month+1, 0).getDate();

// vide début
for (let i = 0; i < firstDay; i++) {
  cal.innerHTML += "<div></div>";
}

// jours
for (let d = 1; d <= daysInMonth; d++) {
  let date = new Date(year, month, d).toDateString();

  let cls = "day";

  if (history[date] === "valid") cls += " valid";
  if (history[date] === "fail") cls += " fail";
  if (date === todayStr) cls += " today";

  cal.innerHTML += `<div class="${cls}">${d}</div>`;
}
</script>

</body>
</html>
